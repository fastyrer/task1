<section class="workspace-view" data-view="contacts" aria-labelledby="contactsTitle" hidden>
  <header class="view-header">
    <div>
      <p class="eyebrow">Справочник PostgreSQL</p>
      <h1 id="contactsTitle">Все контакты</h1>
      <p class="view-description">Найдите и при необходимости исправьте подтверждённые данные рабочего справочника.</p>
    </div>
    <button id="refreshContactsButton" type="button" class="icon-button" title="Обновить контакты" aria-label="Обновить контакты">
      <span data-icon="refresh-cw" aria-hidden="true"></span>
    </button>
  </header>

  <form id="contactsSearchForm" class="search-toolbar contact-search-toolbar" role="search">
    <label class="search-field" for="contactsSearchInput">
      <span data-icon="search" aria-hidden="true"></span>
      <input id="contactsSearchInput" type="text" maxlength="200" autocomplete="off" placeholder="Телефон, ФИО, email, скидка или UID">
    </label>
    <button id="contactsSearchButton" type="submit" class="btn-primary">
      <span data-icon="search" aria-hidden="true"></span><span>Найти</span>
    </button>
    <button id="clearContactsSearchButton" type="button" class="icon-button" title="Очистить поиск" aria-label="Очистить поиск" disabled>
      <span data-icon="x" aria-hidden="true"></span>
    </button>
  </form>

  <section class="directory-toolbar" aria-label="Сводка справочника">
    <div>
      <span id="contactsCountLabel" class="command-label">Записей в PostgreSQL</span>
      <strong id="contactsCountInfo">Загрузка...</strong>
    </div>
    <span id="contactsLoadStatus" class="meta" role="status" aria-live="polite">Получаем первую страницу</span>
  </section>

  <div id="contactsError" class="error" role="alert"></div>
  <div class="table-wrap directory-table-wrap">
    <table id="contactsTable" class="contact-directory-table">
      <tbody><tr><td class="empty-state">Контакты загружаются...</td></tr></tbody>
    </table>
  </div>

  <nav class="directory-pagination" aria-label="Страницы контактов">
    <button id="previousContactsPage" type="button" class="icon-button" title="Предыдущая страница" aria-label="Предыдущая страница" disabled>
      <span data-icon="chevron-left" aria-hidden="true"></span>
    </button>
    <strong id="contactsPageInfo">Страница 1</strong>
    <button id="nextContactsPage" type="button" class="icon-button" title="Следующая страница" aria-label="Следующая страница" disabled>
      <span data-icon="chevron-right" aria-hidden="true"></span>
    </button>
  </nav>
</section>
