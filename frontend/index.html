<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f4f6f8">
    <title>Task1 — данные клиентов</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/features.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand-block">
          <span class="brand-mark" aria-hidden="true">T1</span>
          <div>
            <strong class="brand-name">Task1</strong>
            <span class="brand-caption">Client Data</span>
          </div>
        </div>

        <div class="header-actions">
          <div id="dbStatus" class="db-status" data-state="checking" role="status" aria-live="polite">
            <span class="status-dot" aria-hidden="true"></span>
            <span data-icon="database" class="icon-sm" aria-hidden="true"></span>
            <span id="dbStatusText">Проверяем PostgreSQL</span>
          </div>
          <a class="icon-link" href="/swagger" target="_blank" rel="noreferrer" title="Открыть документацию API">
            <span data-icon="info" aria-hidden="true"></span>
            <span class="desktop-only">API</span>
          </a>
        </div>
      </header>

      <aside class="app-sidebar" aria-label="Основная навигация">
        <nav class="primary-nav">
          <button class="nav-item is-active" type="button" data-view-target="files" aria-current="page">
            <span data-icon="file-spreadsheet" aria-hidden="true"></span>
            <span>Файлы</span>
          </button>
          <button class="nav-item" type="button" data-view-target="contacts">
            <span data-icon="users" aria-hidden="true"></span>
            <span>Контакты</span>
            <span id="contactsNavBadge" class="nav-badge is-hidden">0</span>
          </button>
          <button class="nav-item" type="button" data-view-target="notifications">
            <span data-icon="send" aria-hidden="true"></span>
            <span>Рассылка</span>
          </button>
        </nav>

        <div class="sidebar-note">
          <span data-icon="database" aria-hidden="true"></span>
          <span>Данные хранятся в PostgreSQL</span>
        </div>
      </aside>

      <main class="app-main">
        <div id="errorBlock" class="error global-error" role="alert"></div>
        <div id="workspaceMount" aria-live="polite">
          <div class="empty-workspace loading-workspace">Загружаем рабочую область...</div>
        </div>
      </main>
    </div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
