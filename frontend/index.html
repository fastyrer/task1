<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Загрузка данных клиентов</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --surface: #ffffff;
        --border: #d7dce2;
        --text: #17202a;
        --muted: #5d6978;
        --accent: #0f766e;
        --accent-dark: #0b5f59;
        --danger-bg: #fff1f1;
        --danger-text: #a51d2d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 28px;
        line-height: 1.2;
        font-weight: 700;
        letter-spacing: 0;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 18px;
        line-height: 1.3;
        letter-spacing: 0;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
      }

      .stack {
        display: grid;
        gap: 18px;
      }

      .upload-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
      }

      input[type="file"] {
        max-width: 100%;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px;
        background: #fbfcfd;
        color: var(--text);
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 6px;
        padding: 0 16px;
        background: var(--accent);
        color: #ffffff;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .error {
        display: none;
        border: 1px solid #f0b5bd;
        border-radius: 6px;
        padding: 12px 14px;
        background: var(--danger-bg);
        color: var(--danger-text);
      }

      .error:not(:empty) {
        display: block;
      }

      .meta {
        color: var(--muted);
        font-size: 14px;
      }

      .headers-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .headers-list li {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 6px 10px;
        background: #f8fafb;
        color: var(--text);
        font-size: 14px;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      table {
        width: 100%;
        min-width: 640px;
        border-collapse: collapse;
        background: var(--surface);
      }

      th,
      td {
        border-bottom: 1px solid var(--border);
        padding: 10px 12px;
        text-align: left;
        vertical-align: top;
        white-space: nowrap;
      }

      th {
        background: #eef2f5;
        font-size: 13px;
        color: #27313d;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .empty-state {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="stack">
      <h1>Загрузка данных клиентов</h1>

      <section class="panel stack" aria-label="Загрузка файла">
        <div class="upload-row">
          <input type="file" id="fileInput" accept=".csv,.xls,.xlsx">
          <button id="uploadButton" type="button">Загрузить файл</button>
        </div>
        <div id="errorBlock" class="error" role="alert"></div>
        <div id="fileInfo" class="meta"></div>
      </section>

      <section class="panel stack" aria-label="Заголовки колонок">
        <h2>Заголовки</h2>
        <div id="headersBlock" class="empty-state">Файл еще не загружен.</div>
      </section>

      <section class="panel stack" aria-label="Предварительный просмотр">
        <h2>Первые строки</h2>
        <div class="table-wrap">
          <table id="previewTable">
            <tbody>
              <tr>
                <td class="empty-state">Данные появятся после загрузки файла.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const fileInput = document.getElementById("fileInput");
      const uploadButton = document.getElementById("uploadButton");
      const errorBlock = document.getElementById("errorBlock");
      const headersBlock = document.getElementById("headersBlock");
      const previewTable = document.getElementById("previewTable");
      const fileInfo = document.getElementById("fileInfo");
      const apiURL = window.location.protocol === "file:" ? "http://localhost:8080/api/upload" : "/api/upload";

      uploadButton.addEventListener("click", async () => {
        clearError();

        const file = fileInput.files[0];
        if (!file) {
          showError("Выберите CSV, XLS или XLSX-файл.");
          return;
        }

        const formData = new FormData();
        formData.append("file", file);

        uploadButton.disabled = true;
        uploadButton.textContent = "Загрузка...";

        try {
          const response = await fetch(apiURL, {
            method: "POST",
            body: formData,
          });
          const payload = await response.json();

          if (!response.ok) {
            showError(payload.error || "Не удалось загрузить файл.");
            return;
          }

          renderResult(payload);
        } catch (error) {
          showError("Не удалось подключиться к серверу.");
        } finally {
          uploadButton.disabled = false;
          uploadButton.textContent = "Загрузить файл";
        }
      });

      function renderResult(payload) {
        fileInfo.textContent = `fileId: ${payload.fileId}`;
        renderHeaders(payload.headers || []);
        renderPreview(payload.headers || [], payload.previewRows || []);
      }

      function renderHeaders(headers) {
        if (!headers.length) {
          headersBlock.className = "empty-state";
          headersBlock.textContent = "Заголовки не найдены.";
          return;
        }

        headersBlock.className = "";
        const list = document.createElement("ul");
        list.className = "headers-list";

        headers.forEach((header) => {
          const item = document.createElement("li");
          item.textContent = header;
          list.appendChild(item);
        });

        headersBlock.replaceChildren(list);
      }

      function renderPreview(headers, rows) {
        if (!headers.length || !rows.length) {
          previewTable.innerHTML = '<tbody><tr><td class="empty-state">Нет строк для preview.</td></tr></tbody>';
          return;
        }

        const thead = document.createElement("thead");
        const headerRow = document.createElement("tr");
        headers.forEach((header) => {
          const cell = document.createElement("th");
          cell.textContent = header;
          headerRow.appendChild(cell);
        });
        thead.appendChild(headerRow);

        const tbody = document.createElement("tbody");
        rows.forEach((row) => {
          const tr = document.createElement("tr");
          headers.forEach((header) => {
            const cell = document.createElement("td");
            cell.textContent = row[header] || "";
            tr.appendChild(cell);
          });
          tbody.appendChild(tr);
        });

        previewTable.replaceChildren(thead, tbody);
      }

      function showError(message) {
        errorBlock.textContent = message;
      }

      function clearError() {
        errorBlock.textContent = "";
      }
    </script>
  </body>
</html>
