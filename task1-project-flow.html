a {
  color: color-mix(in srgb, var(--viz-accent) 80%, var(--viz-text) 20%);

  font-weight: var(--viz-font-weight-medium);
  text-decoration: none;
  text-underline-offset: 2px;
}

a:is(:hover, :focus-visible) {
  text-decoration-line: underline;
  text-decoration-style: dashed;
  text-decoration-thickness: 0.5px;

h1,
h2,
h3,
h4,
h5,
h6,
p {
  margin-block: 0;

h1 {

  font-weight: var(--font-weight-medium);

h2 {

  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

h3,
h4,
h5,
h6 {
  font-size: var(--font-size-h3);
  font-weight: var(--font-weight-medium);
  line-height: 1.3;
}

b,
strong,
th {
  font-weight: var(--font-weight-medium);
}

code:not(pre code) {

  padding: 1px 6px;
  border-radius: var(--radius-sm);

  background: var(--muted);
  font-family: var(--font-mono);
  font-size: 0.92em;
  overflow-wrap: anywhere;
  -webkit-box-decoration-break: clone;
  box-decoration-break: clone;
  word-break: break-word;
}

#widget {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  padding: 0;
  background: transparent !important;
}

.card {
  min-width: 0;
  padding: 12px;
  overflow: hidden;
  overflow-wrap: break-word;
  border-radius: var(--radius-2xl);
  corner-shape: superellipse(1.5);
  color: var(--card-foreground);
  background: var(--card);
}

#widget &gt; :not(.card) {
  width: 100% !important;
  max-width: none !important;
  margin: 0 !important;
  padding: 0 !important;
  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
}

.tooltip {
  position: fixed;
  z-index: 50;
  top: 0;
  left: 0;
  width: max-content;
  max-width: min(
    20rem,
    var(--tooltip-available-width, calc(100vw - 10px)),
    calc(100vw - 10px)
  );
  max-height: min(
    var(--tooltip-available-height, calc(100vh - 10px)),
    calc(100vh - 10px)
  );
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--popover-foreground);
  background: var(--popover);
  box-shadow: none;
  font-size: var(--font-size-tooltip);
  line-height: var(--line-height-tooltip);
  overflow-wrap: break-word;
  white-space: normal;
  pointer-events: none;
  user-select: none;
}

.viz-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(max(180px, 24%), 1fr));
  gap: 10px;
}

.viz-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.viz-stat-value {
  font-size: var(--font-size-h2);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

.viz-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
}

.viz-badge {
  padding: 3px 8px;
  border-radius: var(--radius-full);
  color: var(--accent-foreground);
  background: var(--accent);
  font-weight: var(--font-weight-medium);
}

small,
.text-small,
.viz-badge {
  font-size: var(--font-size-small);
  line-height: var(--line-height-small);
}

.text-muted {
  color: var(--muted-foreground);
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.viz-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}

.viz-controls &gt; .form-label {
  display: grid;
  min-width: min(100%, 260px);
  flex: 1 1 280px;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: baseline;
  gap: 2px 12px;
  margin-bottom: 0;
}

.viz-controls &gt; .form-label &gt; :is(.form-control, .form-range, .form-select) {
  grid-column: 1 / -1;

.btn {
  appearance: button;
  display: inline-flex;
  inline-size: fit-content;
  max-inline-size: 100%;
  min-height: 28px;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin: 0;
  padding: 0 8px;
  -webkit-app-region: no-drag;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: var(--cursor-interaction, pointer);
  text-align: center;
  text-decoration: none;
  white-space: nowrap;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

.btn:is(.btn-block, .viz-tile) {
  inline-size: 100%;
}

.btn.viz-tile {
  min-width: 0;
  overflow-wrap: anywhere;
  white-space: normal;
}

a.btn {
  cursor: pointer;
  text-decoration: none;
}

.btn:not(:disabled):hover {
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.btn-primary {
  border-color: transparent;
  color: var(--primary-foreground);
  background: var(--foreground);
  background-clip: padding-box;
}

.btn-primary .text-muted {
  color: color-mix(in srgb, var(--primary-foreground) 50%, transparent);
}

.btn-primary:not(:disabled):hover {
  background: color-mix(in srgb, var(--foreground) 80%, transparent);
  background-clip: padding-box;
}

.btn-ghost {
  border-color: transparent;
  color: var(--muted-foreground);
  background: transparent;
}

.btn-ghost:not(:disabled):hover {
  color: var(--foreground);
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.btn:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

[data-lucide] {
  stroke-width: 1.6;
}

.form-label {
  display: block;
  margin-bottom: 6px;
  color: var(--foreground);
}

.form-control {

  width: 100%;
  min-height: 28px;
  padding: 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background: var(--secondary);
}

  padding: 0;

  cursor: var(--cursor-interaction, pointer);

  border: 0;

  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: inherit;
  font: inherit;
}

.form-control[type=&quot;file&quot;]:not(:disabled):hover::file-selector-button {
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.form-control-color[type=&quot;color&quot;] {
  width: 40px;
  height: 28px;
  padding: 3px;
  cursor: var(--cursor-interaction, pointer);
}

.form-control-color[type=&quot;color&quot;]::-webkit-color-swatch-wrapper {
  padding: 0;
}

.form-control-color[type=&quot;color&quot;]::-webkit-color-swatch {
  border: 0;
  border-radius: calc(var(--radius-lg) - 4px);
  corner-shape: superellipse(1.5);
}

textarea.form-control {
  height: auto;
  min-height: 72px;
  padding: 8px 10px;
  resize: vertical;
}

.form-control:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-control:disabled,
.form-select:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.form-select {
  appearance: none;
  display: block;
  width: 100%;
  min-height: 28px;
  margin: 0;
  padding: 0 32px 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background-color: var(--secondary);
  background-image:

    linear-gradient(135deg, var(--muted-foreground) 50%, transparent 50%);

  background-size: 4px 4px;
  cursor: var(--cursor-interaction, default);

.form-select:not(:disabled):hover {
  background-color: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.form-select:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-check {
  display: flex;
  min-height: 20px;
  align-items: center;
  gap: 6px;
}

.form-check-input {
  appearance: none;
  width: 14px;
  height: 14px;
  flex: 0 0 auto;
  margin: 0;
  border: 1px solid var(--input);
  color: var(--primary-foreground);
  background-color: transparent;
  cursor: var(--cursor-interaction, default);
  transition:
    background-color 150ms,
    border-color 150ms,
    box-shadow 150ms;

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;] {
  border-color: var(--input);
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background-color: var(--secondary);
  box-shadow: var(--shadow-sm);
}

.form-check:not(.form-switch)

  background-color: var(--card);
}

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;]:checked {
  border-color: var(--primary);
  background-color: var(--primary);
}

  width: 100%;
  height: 100%;

  height: 14px;
  border-radius: var(--radius-full);

.form-check-input[type=&quot;radio&quot;]:checked {

  background:

.form-check:not(.form-switch) .form-check-input:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;

.form-check:not(.form-switch) .form-check-input:disabled {
  cursor: not-allowed;
  pointer-events: none;
}

.form-check:not(.form-switch) .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
}

.form-switch .form-check-input:disabled,
.form-switch .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
  opacity: 0.6;
}

.form-check-label {
  color: var(--foreground);
  cursor: var(--cursor-interaction, default);
}

.form-switch .form-check-input {
  position: relative;
  width: 32px;
  height: 20px;
  border: 0;
  border-radius: var(--radius-full);
  background: var(--muted);
  box-shadow: none;
  transition: background-color 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input::before {
  position: absolute;
  top: 50%;
  left: 0;
  width: 16px;
  height: 16px;
  box-sizing: border-box;
  border: 1px solid light-dark(var(--primary-foreground), var(--foreground));
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;

  margin: 0;
  padding: 0;

  accent-color: var(--primary);
  background: linear-gradient(

  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));

  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);

}

.form-range:disabled {

}

.btn:not(.btn-primary, .viz-tile):is(

    [aria-selected=&quot;true&quot;],

  ) {

  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {

}

html&gt;body{padding:0}&lt;/style&gt;

&lt;body&gt;
&lt;div id=&quot;task1-flow-map&quot;&gt;
  &lt;style&gt;

      padding: 12px 0;

  &lt;div class=&quot;tf-controls&quot;&gt;

      &lt;span class=&quot;tf-label&quot;&gt;Раздел проекта&lt;/span&gt;
      &lt;select class=&quot;input&quot; id=&quot;task1-flow-select&quot; aria-label=&quot;Выберите раздел проекта&quot;&gt;&lt;/select&gt;

    &lt;div class=&quot;tf-count&quot; id=&quot;task1-flow-count&quot;&gt;&lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;tf-legend&quot; id=&quot;task1-flow-legend&quot; aria-label=&quot;Слои проекта&quot;&gt;&lt;/div&gt;

  &lt;div class=&quot;tf-header&quot;&gt;
    &lt;h3 id=&quot;task1-flow-title&quot;&gt;&lt;/h3&gt;

  &lt;div class=&quot;tf-flow&quot; id=&quot;task1-flow-content&quot; aria-live=&quot;polite&quot;&gt;&lt;/div&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&quot;task1-flow-map&quot;);
      const select = root.querySelector(&quot;#task1-flow-select&quot;);
      const count = root.querySelector(&quot;#task1-flow-count&quot;);
      const title = root.querySelector(&quot;#task1-flow-title&quot;);
      const note = root.querySelector(&quot;#task1-flow-note&quot;);
      const content = root.querySelector(&quot;#task1-flow-content&quot;);
      const legend = root.querySelector(&quot;#task1-flow-legend&quot;);

      const layers = {
        &quot;Пользователь&quot;: &quot;var(--viz-series-1)&quot;,
        &quot;Frontend&quot;: &quot;var(--viz-series-2)&quot;,
        &quot;Handler&quot;: &quot;var(--viz-series-3)&quot;,
        &quot;Service&quot;: &quot;var(--viz-series-4)&quot;,
        &quot;Utils&quot;: &quot;var(--viz-series-5)&quot;,
        &quot;Storage&quot;: &quot;var(--viz-series-6)&quot;,
        &quot;PostgreSQL&quot;: &quot;var(--primary)&quot;,
        &quot;Docker&quot;: &quot;var(--muted-foreground)&quot;,
        &quot;Model&quot;: &quot;var(--foreground)&quot;
      };

      const flows = [
        {
          title: &quot;Общая архитектура и направление данных&quot;,
          note: &quot;Каждый слой принимает результат предыдущего слоя и возвращает данные обратно по той же цепочке.&quot;,
          steps: [
            { layer: &quot;Пользователь&quot;, title: &quot;Действие в браузере&quot;, file: &quot;index.html&quot;, input: &quot;Файл, поисковая строка, шаблон, исправления или решение конфликта.&quot;, action: &quot;Нажимает кнопку или редактирует ячейки.&quot;, output: &quot;Событие JavaScript с пользовательскими данными.&quot;, link: &quot;JavaScript формирует FormData или JSON.&quot; },
            { layer: &quot;Frontend&quot;, title: &quot;Состояние текущей загрузки&quot;, file: &quot;index.html: currentFileId, currentHeaders, detectedPhoneColumn&quot;, input: &quot;Ответ /api/upload и последующие действия пользователя.&quot;, action: &quot;Хранит только состояние открытой страницы и вызывает fetch.&quot;, output: &quot;HTTP-запрос в один из /api/* маршрутов.&quot;, link: &quot;Запрос попадает в http.ServeMux.&quot; },
            { layer: &quot;Handler&quot;, title: &quot;HTTP-граница&quot;, file: &quot;handlers/*.go&quot;, input: &quot;Метод, заголовки, multipart или JSON body, request context.&quot;, action: &quot;Проверяет метод и вход, вызывает service/storage, выбирает HTTP status.&quot;, output: &quot;Типизированные Go-данные или JSON/CSV ответ.&quot;, link: &quot;Бизнес-данные передаются в services.&quot; },
            { layer: &quot;Service&quot;, title: &quot;Бизнес-логика&quot;, file: &quot;services/*.go&quot;, input: &quot;FileData, строки, контакты, шаблоны и параметры парсинга.&quot;, action: &quot;Парсит, нормализует, валидирует, сравнивает и формирует конфликты.&quot;, output: &quot;FileData, Contact, ProcessingResult, уведомления или ошибка.&quot;, link: &quot;Чистые операции делегируются utils, сохранение делегируется storage.&quot; },
            { layer: &quot;Utils&quot;, title: &quot;Чистые утилиты&quot;, file: &quot;utils/*.go&quot;, input: &quot;Байты, строки, заголовки, ячейки, номера и листы Excel.&quot;, action: &quot;Определяет сигнатуры, кодировку, тип колонки, нормализует значения.&quot;, output: &quot;Преобразованное значение и признак корректности.&quot;, link: &quot;Результат возвращается service/handler без состояния и БД.&quot; },
            { layer: &quot;Storage&quot;, title: &quot;Граница PostgreSQL&quot;, file: &quot;storage/postgres_*.go&quot;, input: &quot;FileData, Contact, fileId, phone, query, action, context.&quot;, action: &quot;Выполняет локальные SQL-константы, транзакции, COPY и Scan.&quot;, output: &quot;Модели Go, ID, found-флаг или доменная ошибка.&quot;, link: &quot;Параметризованные запросы отправляются через pgxpool.&quot; },
            { layer: &quot;PostgreSQL&quot;, title: &quot;Постоянное состояние&quot;, file: &quot;uploaded_files, file_rows, contacts, contact_sources, contact_versions&quot;, input: &quot;SQL и параметры $1...$N.&quot;, action: &quot;Проверяет UNIQUE/CHECK/FK, индексы и фиксирует транзакции.&quot;, output: &quot;Строки SELECT, timestamps, conflict/no rows или изменённые записи.&quot;, link: &quot;Ответ поднимается обратно: storage -&gt; service -&gt; handler -&gt; frontend.&quot; },
            { layer: &quot;Frontend&quot;, title: &quot;Отображение результата&quot;, file: &quot;index.html: render* functions&quot;, input: &quot;JSON, CSV Blob или HTTP error.&quot;, action: &quot;Строит таблицы, статистику, подсветку, конфликты и сообщения.&quot;, output: &quot;Пользователь видит результат; следующий запрос использует currentFileId.&quot;, link: &quot;Новый пользовательский шаг начинает следующую цепочку.&quot; }
          ]
        },
        {
          title: &quot;Запуск Docker, миграции и HTTP-сервер&quot;,
          note: &quot;HTTP-приложение запускается только после healthy PostgreSQL и успешного одноразового мигратора.&quot;,
          steps: [
            { layer: &quot;Пользователь&quot;, title: &quot;Команда запуска&quot;, file: &quot;terminal&quot;, input: &quot;docker compose up --build; .env с POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD, HOST_PORT.&quot;, action: &quot;Просит Compose собрать образ и создать сервисы.&quot;, output: &quot;Конфигурация app, migrate, db и volume.&quot;, link: &quot;Compose сначала запускает db.&quot; },
            { layer: &quot;Docker&quot;, title: &quot;Сервис db&quot;, file: &quot;compose.yml: db&quot;, input: &quot;POSTGRES_* и volume postgres_data.&quot;, action: &quot;Запускает postgres:16-alpine; внутренний порт 5432 не публикуется на хост.&quot;, output: &quot;Работающий PostgreSQL с постоянным каталогом данных.&quot;, link: &quot;Healthcheck вызывает pg_isready.&quot; },
            { layer: &quot;PostgreSQL&quot;, title: &quot;Healthcheck базы&quot;, file: &quot;compose.yml: db.healthcheck&quot;, input: &quot;POSTGRES_USER и POSTGRES_DB.&quot;, action: &quot;Проверяет готовность принимать соединения.&quot;, output: &quot;healthy или unhealthy.&quot;, link: &quot;healthy разрешает старт migrate.&quot; },
            { layer: &quot;Docker&quot;, title: &quot;Сервис migrate&quot;, file: &quot;compose.yml: migrate&quot;, input: &quot;Тот же image и DATABASE_URL; command ./server migrate.&quot;, action: &quot;Запускает бинарник в одноразовом режиме с read_only и tmpfs.&quot;, output: &quot;Аргументы процесса: [server, migrate].&quot;, link: &quot;main.go выбирает ветку миграции.&quot; },
            { layer: &quot;Service&quot;, title: &quot;Ветка main: migrate&quot;, file: &quot;main.go -&gt; storage.MigrateFromEnv&quot;, input: &quot;context.Background, os.Args, DATABASE_URL.&quot;, action: &quot;Не создаёт HTTP-сервер; передаёт URL в MigratePostgres.&quot;, output: &quot;Ошибка или управление мигратору.&quot;, link: &quot;Создаётся отдельный pgx pool из одного соединения.&quot; },
            { layer: &quot;Storage&quot;, title: &quot;runMigrations&quot;, file: &quot;storage/migrations.go&quot;, input: &quot;Embedded migrations/*.up.sql, migration timeout, pool.&quot;, action: &quot;BEGIN -&gt; advisory lock -&gt; schema_migrations -&gt; проверка версий -&gt; Exec SQL -&gt; запись версии -&gt; COMMIT.&quot;, output: &quot;Актуальная схема или rollback при любой ошибке.&quot;, link: &quot;Контейнер migrate завершается с кодом 0 только после commit.&quot; },
            { layer: &quot;Docker&quot;, title: &quot;Условие запуска app&quot;, file: &quot;compose.yml: app.depends_on&quot;, input: &quot;db=healthy и migrate=service_completed_successfully.&quot;, action: &quot;Разрешает запуск HTTP-контейнера.&quot;, output: &quot;Процесс ./server с PORT=8080 и DATABASE_URL.&quot;, link: &quot;main.go идёт по обычной ветке.&quot; },
            { layer: &quot;Storage&quot;, title: &quot;NewFromEnv и NewPostgresStorage&quot;, file: &quot;storage/store.go, postgres_storage.go&quot;, input: &quot;DATABASE_URL и DB_* настройки пула.&quot;, action: &quot;ParseConfig -&gt; pool -&gt; Ping -&gt; verifyMigrationVersion.&quot;, output: &quot;Store или фатальная ошибка запуска.&quot;, link: &quot;Готовый store передаётся во все handlers.&quot; },
            { layer: &quot;Handler&quot;, title: &quot;Регистрация маршрутов&quot;, file: &quot;main.go&quot;, input: &quot;http.NewServeMux и один PostgresStorage.&quot;, action: &quot;Регистрирует health, upload, preview/export, search, contacts/fix и GET /.&quot;, output: &quot;Handler с интерфейсами FileStore, ContactStore, HealthStore.&quot;, link: &quot;http.ListenAndServe оборачивается withCORS.&quot; },
            { layer: &quot;Frontend&quot;, title: &quot;Встроенный интерфейс&quot;, file: &quot;main.go: go:embed index.html&quot;, input: &quot;GET /.&quot;, action: &quot;http.ServeContent отдаёт HTML прямо из Go-бинарника.&quot;, output: &quot;Страница приложения в браузере.&quot;, link: &quot;Все дальнейшие запросы идут на тот же origin /api/*.&quot; }
          ]
        },
        {
          title: &quot;HTTP-загрузка файла&quot;,
          note: &quot;Загрузка сохраняет весь разобранный файл, включая невалидные строки; контакты создаются только отдельной кнопкой позже.&quot;,
          steps: [
            { layer: &quot;Пользователь&quot;, title: &quot;Выбор файла&quot;, file: &quot;index.html&quot;, input: &quot;CSV, XLS или XLSX; необязательное имя листа Excel.&quot;, action: &quot;Выбирает файл и нажимает Загрузить.&quot;, output: &quot;File object и строка sheet.&quot;, link: &quot;Frontend собирает multipart/form-data.&quot; },
            { layer: &quot;Frontend&quot;, title: &quot;Формирование FormData&quot;, file: &quot;index.html: uploadButton listener&quot;, input: &quot;fileInput.files[0], sheetInput.value.&quot;, action: &quot;append(file), при наличии append(sheet); fetch POST без ручного Content-Type.&quot;, output: &quot;POST /api/upload с multipart body.&quot;, link: &quot;Запрос принимает UploadHandler.Upload.&quot; },
            { layer: &quot;Handler&quot;, title: &quot;Проверка HTTP и лимита&quot;, file: &quot;handlers/upload.go: Upload&quot;, input: &quot;http.Request, MAX_UPLOAD_SIZE_BYTES/MB.&quot;, action: &quot;Разрешает POST/OPTIONS; MaxBytesReader; ParseMultipartForm.&quot;, output: &quot;Разобранная multipart-форма или 405/413/400.&quot;, link: &quot;Из формы читаются file и sheet.&quot; },
            { layer: &quot;Handler&quot;, title: &quot;Извлечение файла&quot;, file: &quot;handlers/upload.go: r.FormFile&quot;, input: &quot;Поле file и его multipart.FileHeader.&quot;, action: &quot;Проверяет наличие и header.Size &gt; 0; defer file.Close.&quot;, output: &quot;multipart.File, filename, size, browser MIME.&quot;, link: &quot;Файл передаётся ParseByFilenameWithOptions.&quot; },
            { layer: &quot;Service&quot;, title: &quot;Чтение и определение формата&quot;, file: &quot;services/file_parser.go&quot;, input: &quot;multipart.File, filename, ParseOptions{SheetName}.&quot;, action: &quot;io.ReadAll; проверка пустоты; расширение сверяется с XLS/XLSX сигнатурой.&quot;, output: &quot;content []byte и format csv/xls/xlsx либо пользовательская ошибка.&quot;, link: &quot;CSV и Excel расходятся по разным парсерам.&quot; },
            { layer: &quot;Service&quot;, title: &quot;Парсинг содержимого&quot;, file: &quot;services/csv_parser.go или excel_parser.go&quot;, input: &quot;Байты файла и выбранный лист.&quot;, action: &quot;Получает последовательность parsedRecord{Number, Values}.&quot;, output: &quot;Сырые строки с исходными номерами.&quot;, link: &quot;Все форматы сходятся в recordsToFileData.&quot; },
            { layer: &quot;Service&quot;, title: &quot;Общая обработка строк&quot;, file: &quot;recordsToFileData&quot;, input: &quot;[]parsedRecord.&quot;, action: &quot;Находит заголовки, пропускает пустые строки, строит map header-&gt;value, валидирует.&quot;, output: &quot;models.FileData с Rows, RowNumbers, InvalidRows, Warnings, Stats.&quot;, link: &quot;Handler добавляет HTTP-метаданные файла.&quot; },
            { layer: &quot;Handler&quot;, title: &quot;Дополнение метаданных&quot;, file: &quot;handlers/upload.go&quot;, input: &quot;FileData и multipart.FileHeader.&quot;, action: &quot;Записывает originalFilename, size, MIMEType; сравнивает MIME с определённым форматом.&quot;, output: &quot;Полный FileData для постоянного сохранения.&quot;, link: &quot;Вызывает FileStore.SaveFileData.&quot; },
            { layer: &quot;Storage&quot;, title: &quot;Сохранение файла&quot;, file: &quot;storage/postgres_files.go: SaveFileData&quot;, input: &quot;FileData и request context.&quot;, action: &quot;Генерирует fileId; транзакционно сохраняет metadata и каждую строку.&quot;, output: &quot;fileId или ошибка с rollback.&quot;, link: &quot;Handler формирует ограниченный ответ для frontend.&quot; },
            { layer: &quot;Handler&quot;, title: &quot;uploadResponse&quot;, file: &quot;handlers/upload.go&quot;, input: &quot;Сохранённый FileData и fileId.&quot;, action: &quot;Берёт первые 10 строк; определяет телефонную колонку.&quot;, output: &quot;JSON: fileId, metadata, headers, previewRows, stats, warnings, invalidRows, detectedPhoneColumn.&quot;, link: &quot;Frontend вызывает renderResult.&quot; },
            { layer: &quot;Frontend&quot;, title: &quot;Состояние открытого файла&quot;, file: &quot;index.html: renderResult&quot;, input: &quot;uploadResponse JSON.&quot;, action: &quot;Сохраняет currentFileId/currentHeaders/detectedPhoneColumn и строит таблицы.&quot;, output: &quot;Доступны поиск, шаблоны, исправление и сохранение контактов.&quot;, link: &quot;Следующие запросы ссылаются на файл только через fileId.&quot; }
          ]
        },
        {
          title: &quot;Разбор CSV от байтов до FileData&quot;,
          note: &quot;CSV полностью декодируется в UTF-8, после чего все строки проходят общий конвейер заголовков и валидации.&quot;,
          steps: [
            { layer: &quot;Service&quot;, title: &quot;parseCSVContent&quot;, file: &quot;services/csv_parser.go&quot;, input: &quot;content []byte.&quot;, action: &quot;Запускает декодирование, определение разделителя и csv.Reader.&quot;, output: &quot;[]parsedRecord или ErrInvalidCSV.&quot;, link: &quot;Первый этап: DecodeCSVContent.&quot; },
            { layer: &quot;Utils&quot;, title: &quot;Проверка кодировки&quot;, file: &quot;utils/encoding.go: DecodeCSVContent&quot;, input: &quot;Сырые байты.&quot;, action: &quot;LooksBinary; UTF-8 BOM; utf8.Valid; иначе Windows-1251 decoder.&quot;, output: &quot;UTF-8 string + имя кодировки или ErrInvalidEncoding.&quot;, link: &quot;Текст передаётся определителю разделителя.&quot; },

      flows.forEach((flow, index) =&gt; {
        const option = document.createElement(&quot;option&quot;);

      function renderFlow(index) {

          const layerColor = layers[step.layer] || &quot;var(--foreground)&quot;;
          const row = document.createElement(&quot;section&quot;);

          layerSwatch.className = &quot;tf-swatch&quot;;

          layerText.textContent = step.layer;
          layerName.append(layerSwatch, layerText);

          const stepTitle = document.createElement(&quot;span&quot;);
          stepTitle.className = &quot;tf-title&quot;;
          stepTitle.textContent = step.title;

          const file = document.createElement(&quot;span&quot;);
          file.className = &quot;tf-file&quot;;
          const code = document.createElement(&quot;code&quot;);
          code.textContent = step.file;
          file.appendChild(code);

          main.append(layerName, stepTitle, file);
          row.append(number, main, cell(&quot;Принимает&quot;, step.input), cell(&quot;Что делает&quot;, step.action), cell(&quot;Передаёт дальше&quot;, step.output));
          content.appendChild(row);

          if (stepIndex &lt; flow.steps.length - 1) {
            const arrow = document.createElement(&quot;div&quot;);
            arrow.className = &quot;tf-arrow&quot;;
            const mark = document.createElement(&quot;span&quot;);
            mark.className = &quot;tf-arrow-mark&quot;;

            const arrowText = document.createElement(&quot;span&quot;);
            arrowText.className = &quot;tf-arrow-text&quot;;
            arrowText.textContent = step.link;
            arrow.append(mark, arrowText);
            content.appendChild(arrow);
          }
        });
      }

      select.addEventListener(&quot;change&quot;, () =&gt; renderFlow(Number(select.value)));
      renderFlow(0);
    })();

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;

&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
