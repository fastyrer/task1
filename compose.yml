services:
  # app запускает HTTP-сервер только после healthy-статуса БД и успешных миграций.
  app:
    build: .
    image: task1-app:local
    restart: unless-stopped
    environment:
      PORT: "8080"
      # Внутри Compose приложение обращается к PostgreSQL по имени сервиса db.
      DATABASE_URL: "host=db port=5432 user=${POSTGRES_USER:-task1} password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required} dbname=${POSTGRES_DB:-task1} sslmode=disable"
      MAX_UPLOAD_SIZE_MB: "20"
      # Swagger UI удобен локально; в production его можно полностью отключить.
      SWAGGER_ENABLED: "${SWAGGER_ENABLED:-true}"
      # Размер пула и таймауты можно менять без пересборки Docker-образа.
      DB_MAX_CONNS: "10"
      DB_MIN_CONNS: "1"
      DB_CONNECT_TIMEOUT_SECONDS: "10"
      DB_QUERY_TIMEOUT_SECONDS: "5"
      DB_IMPORT_TIMEOUT_SECONDS: "${DB_IMPORT_TIMEOUT_SECONDS:-45}"
      DB_MIGRATION_TIMEOUT_SECONDS: "60"
      DB_MAX_CONN_IDLE_TIME_SECONDS: "1800"
      DB_MAX_CONN_LIFETIME_SECONDS: "3600"
      DB_HEALTH_CHECK_SECONDS: "30"
    ports:
      # HOST_PORT меняет только внешний порт; внутри контейнера сервер всегда слушает 8080.
      - "${HOST_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Файловая система контейнера только для чтения; временные файлы разрешены только в /tmp.
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true

  # migrate выполняет "server migrate" один раз и завершается с кодом 0.
  migrate:
    image: task1-app:local
    pull_policy: never
    command: ["./server", "migrate"]
    restart: "no"
    environment:
      # В production здесь можно указать отдельную роль БД с правами на DDL.
      DATABASE_URL: "host=db port=5432 user=${POSTGRES_USER:-task1} password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required} dbname=${POSTGRES_DB:-task1} sslmode=disable"
      DB_MIGRATION_TIMEOUT_SECONDS: "60"
    depends_on:
      db:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true

  # db хранит данные в именованном volume; порт PostgreSQL на хост не публикуется.
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
    - "127.0.0.1:5432:5432"
    environment:
      # Пароль не имеет слабого значения по умолчанию и обязан прийти из .env/окружения.
      POSTGRES_DB: ${POSTGRES_DB:-task1}
      POSTGRES_USER: ${POSTGRES_USER:-task1}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  # Volume переживает docker compose down; удаляется только при down -v.
  postgres_data:
