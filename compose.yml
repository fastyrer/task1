services:
  app:
    build: .
    restart: unless-stopped
    environment:
      PORT: "8080"
      STORAGE_DRIVER: postgres
      DATABASE_URL: "host=db port=5432 user=${POSTGRES_USER:-task1} password=${POSTGRES_PASSWORD:-task1_password} dbname=${POSTGRES_DB:-task1} sslmode=disable"
      MAX_UPLOAD_SIZE_MB: "20"
      SEARCH_RESULT_LIMIT: "1000"
      DB_MAX_CONNS: "10"
      DB_MIN_CONNS: "1"
      DB_CONNECT_TIMEOUT_SECONDS: "10"
      DB_QUERY_TIMEOUT_SECONDS: "5"
    ports:
      - "${HOST_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-task1}
      POSTGRES_USER: ${POSTGRES_USER:-task1}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-task1_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task1 -d task1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
