basePath: /
consumes:
- application/json
definitions:
  handlers.CommitImportRequest:
    properties:
      decisions:
        items:
          $ref: '#/definitions/models.ImportDecision'
        type: array
      draft:
        $ref: '#/definitions/models.ImportDraft'
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        example: Некорректный запрос
        type: string
    type: object
  handlers.HealthResponse:
    properties:
      error:
        example: storage unavailable
        type: string
      status:
        enum:
        - ok
        - degraded
        example: ok
        type: string
      storage:
        enum:
        - postgres
        example: postgres
        type: string
    type: object
  handlers.NotificationItem:
    properties:
      phone:
        example: "+79991234567"
        type: string
      row:
        example: 1
        type: integer
      text:
        example: 'Здравствуйте, Анна! Ваша скидка: 10%.'
        type: string
    type: object
  handlers.PreviewImportRequest:
    properties:
      draft:
        $ref: '#/definitions/models.ImportDraft'
    type: object
  handlers.PreviewRequest:
    properties:
      template:
        example: 'Здравствуйте, {{Имя}}! Ваша скидка: {{Скидка}}.'
        type: string
    required:
    - template
    type: object
  handlers.PreviewResponse:
    properties:
      notifications:
        items:
          $ref: '#/definitions/handlers.NotificationItem'
        type: array
      skipped:
        example: 0
        type: integer
    type: object
  handlers.ValidateImportRequest:
    properties:
      draft:
        $ref: '#/definitions/models.ImportDraft'
    type: object
  models.ConflictAction:
    enum:
    - skip
    - replace
    - merge
    type: string
    x-enum-varnames:
    - ConflictActionSkip
    - ConflictActionReplace
    - ConflictActionMerge
  models.ConflictInfo:
    properties:
      actions:
        items:
          $ref: '#/definitions/models.ConflictAction'
        type: array
      differences:
        description: Отличные поля
        items:
          type: string
        type: array
      existing:
        additionalProperties:
          type: string
        description: То, что уже лежит в базе
        type: object
      incoming:
        additionalProperties:
          type: string
        description: То, что прислал фронт
        type: object
      phone:
        example: "+79991234567"
        type: string
      row:
        example: 4
        type: integer
      version:
        example: "2026-07-16T08:30:00.123456Z"
        type: string
    type: object
  models.Contact:
    properties:
      createdAt:
        type: string
      discount:
        type: string
      email:
        type: string
      name:
        type: string
      phone:
        type: string
      uid:
        description: UID - публичный UUID контакта, который генерирует PostgreSQL.
        type: string
      updatedAt:
        type: string
    type: object
  models.ContactPage:
    properties:
      items:
        items:
          $ref: '#/definitions/models.Contact'
        type: array
      page:
        example: 1
        type: integer
      pageSize:
        example: 25
        type: integer
      query:
        example: "+7999"
        type: string
      total:
        example: 106
        type: integer
      totalPages:
        example: 5
        type: integer
    type: object
  models.ContactUpdateRequest:
    properties:
      discount:
        example: "10"
        type: string
      email:
        example: client@example.com
        type: string
      name:
        example: Иванов Иван
        type: string
      phone:
        example: "+79991234567"
        type: string
      version:
        example: "2026-07-16T08:30:00.123456Z"
        type: string
    type: object
  models.ImportCommitResult:
    properties:
      created:
        example: 90
        type: integer
      importId:
        type: string
      matched:
        example: 10
        type: integer
      merged:
        example: 1
        type: integer
      replaced:
        example: 2
        type: integer
      skipped:
        example: 1
        type: integer
    type: object
  models.ImportDecision:
    properties:
      action:
        allOf:
        - $ref: '#/definitions/models.ConflictAction'
        enum:
        - skip
        - replace
        - merge
        example: merge
      phone:
        example: "+79991234567"
        type: string
      version:
        example: "2026-07-16T08:30:00.123456Z"
        type: string
    type: object
  models.ImportDraft:
    properties:
      detectedMimeType:
        type: string
      emptyRowCount:
        type: integer
      encoding:
        example: UTF-8
        type: string
      format:
        enum:
        - csv
        - xls
        - xlsx
        example: xlsx
        type: string
      headerRow:
        example: 1
        type: integer
      headers:
        items:
          type: string
        type: array
      importId:
        example: 2f656bc0-6227-49d3-9d09-b2d59bd21c52
        type: string
      mimeType:
        type: string
      originalFilename:
        example: clients.xlsx
        type: string
      rows:
        items:
          $ref: '#/definitions/models.ImportRow'
        type: array
      sheetName:
        example: Клиенты
        type: string
      sheets:
        items:
          type: string
        type: array
      size:
        example: 18432
        type: integer
      skippedRowCount:
        type: integer
    type: object
  models.ImportPreviewResult:
    properties:
      conflictCount:
        example: 4
        type: integer
      conflicts:
        items:
          $ref: '#/definitions/models.ConflictInfo'
        type: array
      matchedCount:
        example: 10
        type: integer
      newCount:
        example: 90
        type: integer
      skippedCount:
        example: 2
        type: integer
    type: object
  models.ImportRow:
    properties:
      rowNumber:
        example: 2
        type: integer
      values:
        additionalProperties:
          type: string
        type: object
    type: object
  models.ImportValidationResult:
    properties:
      detectedPhoneColumn:
        example: Телефон
        type: string
      draft:
        $ref: '#/definitions/models.ImportDraft'
      invalidRows:
        items:
          $ref: '#/definitions/models.InvalidRow'
        type: array
      previewRows:
        items:
          additionalProperties:
            type: string
          type: object
        type: array
      stats:
        $ref: '#/definitions/models.ProcessingStats'
      warnings:
        items:
          $ref: '#/definitions/models.ProcessingWarning'
        type: array
    type: object
  models.InvalidRow:
    properties:
      errors:
        items:
          $ref: '#/definitions/models.ProcessingWarning'
        type: array
      row:
        example: 4
        type: integer
      values:
        additionalProperties:
          type: string
        type: object
    type: object
  models.ProcessingStats:
    properties:
      columnCount:
        example: 4
        type: integer
      emptyRowCount:
        example: 1
        type: integer
      invalidRowCount:
        example: 3
        type: integer
      rowCount:
        example: 100
        type: integer
      skippedRowCount:
        example: 1
        type: integer
      validRowCount:
        example: 96
        type: integer
      warningCount:
        example: 3
        type: integer
    type: object
  models.ProcessingWarning:
    properties:
      column:
        example: Email
        type: string
      message:
        example: Некорректный email.
        type: string
      row:
        example: 4
        type: integer
    type: object
info:
  contact: {}
  description: |-
    API для проверки клиентских CSV/XLS/XLSX, подтверждённого импорта контактов и подготовки рассылок.
    Черновик хранится в браузере; PostgreSQL изменяет финальный атомарный импорт и явное ручное сохранение контакта.
  title: Task1 Client Data API
  version: 1.0.0
paths:
  /api/contacts:
    get:
      description: Возвращает 25 подтверждённых контактов PostgreSQL и общее количество
        совпадений. Поиск выполняется по телефону, ФИО, email, скидке и UID.
      parameters:
      - default: 1
        description: Номер страницы, начиная с 1
        in: query
        name: page
        type: integer
      - description: Подстрока для поиска по всем видимым полям
        in: query
        name: q
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ContactPage'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Получить страницу контактов
      tags:
      - Contacts
  /api/contacts/{uid}:
    put:
      consumes:
      - application/json
      description: Нормализует поля и обновляет контакт, только если его updatedAt
        не изменился. Телефон остаётся уникальным.
      parameters:
      - description: UUID контакта
        in: path
        name: uid
        required: true
        type: string
      - description: Изменяемые поля и текущая версия
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ContactUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Contact'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Изменить контакт
      tags:
      - Contacts
  /api/export:
    post:
      consumes:
      - application/json
      description: Формирует сообщения по всем актуальным контактам PostgreSQL и возвращает
        UTF-8 CSV с колонками «Телефон» и «Сообщение».
      parameters:
      - description: Шаблон сообщения
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.PreviewRequest'
      produces:
      - text/csv
      - application/json
      responses:
        "200":
          description: notifications.csv
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Экспортировать общую рассылку
      tags:
      - Notifications
  /api/health:
    get:
      description: Проверяет доступность PostgreSQL с таймаутом две секунды.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.HealthResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.HealthResponse'
      summary: Проверить состояние приложения
      tags:
      - Health
  /api/imports/commit:
    post:
      consumes:
      - application/json
      description: Повторно проверяет черновик и одной транзакцией сохраняет файл,
        строки, контакты и решения конфликтов.
      parameters:
      - description: Черновик и решения всех конфликтов
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CommitImportRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ImportCommitResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Импортировать подтверждённые контакты
      tags:
      - Imports
  /api/imports/preview:
    post:
      consumes:
      - application/json
      description: Возвращает новые, совпадающие и конфликтующие контакты. Операция
        выполняет только чтение PostgreSQL.
      parameters:
      - description: Проверенный локальный черновик
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.PreviewImportRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ImportPreviewResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Предпросмотр последствий импорта
      tags:
      - Imports
  /api/imports/validate:
    post:
      consumes:
      - application/json
      description: Нормализует строки после редактирования и возвращает новую диагностику.
        PostgreSQL не изменяется.
      parameters:
      - description: Локальный черновик
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.ValidateImportRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ImportValidationResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Повторно проверить локальный черновик
      tags:
      - Imports
  /api/preview:
    post:
      consumes:
      - application/json
      description: Формирует сообщение для каждого актуального контакта PostgreSQL.
        Поддерживаются плейсхолдеры {{Телефон}}, {{Имя}}, {{Email}} и {{Скидка}}.
      parameters:
      - description: Шаблон сообщения
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.PreviewRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PreviewResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Предпросмотр общей рассылки
      tags:
      - Notifications
  /api/upload:
    post:
      consumes:
      - multipart/form-data
      description: Принимает CSV, XLS или XLSX, нормализует все строки и возвращает
        их браузеру. PostgreSQL не изменяется.
      parameters:
      - description: CSV/XLS/XLSX-файл с клиентскими данными
        in: formData
        name: file
        required: true
        type: file
      - description: Имя листа XLS/XLSX; если не задано, используется первый лист
        in: formData
        name: sheet
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ImportValidationResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Проверить файл и создать локальный черновик
      tags:
      - Files
produces:
- application/json
schemes:
- http
- https
swagger: "2.0"
tags:
- description: Состояние приложения и подключение к PostgreSQL
  name: Health
- description: Stateless-загрузка и разбор файлов без записи в PostgreSQL
  name: Files
- description: Проверка черновика, предпросмотр конфликтов и атомарный импорт
  name: Imports
- description: Поиск, постраничный просмотр и ручное редактирование подтверждённого
    справочника PostgreSQL
  name: Contacts
- description: Предпросмотр и экспорт рассылки по всем контактам PostgreSQL
  name: Notifications
